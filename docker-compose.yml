services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/threaded_chat
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-myverysecretkeythatisatleast32byteslong}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15.8
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: threaded_chat
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d threaded_chat"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
