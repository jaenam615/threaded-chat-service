spring.application.name=threaded-chat-service

# DB Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/threaded_chat
spring.datasource.username=app
spring.datasource.password=app
spring.jpa.hibernate.ddl-auto=update

# API Key
anthropic.api-key=${ANTHROPIC_API_KEY}

# JWT
jwt.secret=${JWT_SECRET:myverysecretkeythatisatleast32byteslong}
jwt.expiration=86400000