spring.application.name=threaded-chat-service

# DB Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/threaded_chat
spring.datasource.username=app
spring.datasource.password=app
spring.jpa.hibernate.ddl-auto=update

# API Key
anthropic.api-key=${ANTHROPIC_API_KEY}

# JWT
jwt.secret=${JWT_SECRET:myverysecretkeythatisatleast32byteslong}
jwt.expiration=86400000

# Circuit Breaker
resilience4j.circuitbreaker.instances.claudeApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.claudeApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.claudeApi.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.claudeApi.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.claudeApi.slow-call-duration-threshold=10s
resilience4j.circuitbreaker.instances.claudeApi.slow-call-rate-threshold=80